services:
  db:
    image: postgres:16-alpine
    container_name: safevault-db
    environment:
      POSTGRES_DB: safevault
      POSTGRES_USER: safevault
      POSTGRES_PASSWORD: safevault
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: safevault-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/safevault
      SPRING_DATASOURCE_USERNAME: safevault
      SPRING_DATASOURCE_PASSWORD: safevault
      SECURITY_JWT_SECRET: ${JWT_SECRET:-heWejtBlnBI82RUwcVMqUmR2Ch/4rPOL++ms4FfB1NQ=}
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: safevault-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
